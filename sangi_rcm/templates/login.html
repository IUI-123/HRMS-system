{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>Login - Sangi RCM</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f4f7fb] font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md p-8 sm:p-10 bg-white border border-gray-100 rounded-3xl shadow-xl">
        
        <div class="text-center mb-8">
            <img src="{% static 'logo.png' %}" alt="Sangi RCM Logo" class="mx-auto h-16 md:h-20 w-auto mb-4 object-contain">
            
            <h1 class="text-2xl font-extrabold tracking-wide text-gray-800">SANGI <span class="text-blue-600">RCM</span></h1>
            <p class="text-gray-500 text-sm mt-1">Enterprise Attendance Portal</p>
        </div>

        <form method="POST" action="{% url 'login_view' %}" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" name="username" class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800 placeholder-gray-400 transition" placeholder="Enter your username" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" name="password" class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800 placeholder-gray-400 transition" placeholder="••••••••" required>
            </div>

            <button type="submit" class="w-full py-3 px-4 bg-[#1e293b] hover:bg-gray-800 text-white font-bold rounded-xl shadow-md transition duration-200 mt-4">
                Login to Portal
            </button>
        </form>

        {% if error %}
        <div class="mt-6">
            <p class="text-red-400 text-sm text-center font-bold bg-red-400/10 py-3 rounded-xl border border-red-400/20 shadow-sm animate-pulse">
                ❌ {{ error }}
            </p>
        </div>
        {% endif %}

        {% if messages %}
        <div class="mt-6 space-y-2">
            {% for message in messages %}
            <p class="text-red-400 text-sm text-center font-bold bg-red-400/10 py-3 rounded-xl border border-red-400/20 shadow-sm animate-pulse">
                {{ message }}
            </p>
            {% endfor %}
        </div>
        {% endif %}

    </div>

    <script>
        window.addEventListener('pageshow', function(event) {
            // Check if loaded from cache OR if the navigation type was a "Back/Forward" action (type 2)
            const isBackForward = window.performance && window.performance.navigation.type === 2;
            if (event.persisted || isBackForward) {
                window.location.reload(true); // Forces a hard server reload
            }
        });
    </script>

</body>
</html>
